name: Aggiorna previsioni ECMWF

on:
  workflow_dispatch:
  schedule:
    # 08:20 UTC = 10:20 in Italia in estate, 09:20 in inverno.
    - cron: "20 8 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-weather.yml"

permissions:
  contents: write

concurrency:
  group: meteo-ecmwf-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installa le dipendenze
        run: pip install --disable-pip-version-check -r requirements.txt

      - name: Elabora i dati ECMWF
        run: python scripts/update_weather.py

      - name: Salva il nuovo aggiornamento
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weather.json
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare."
          else
            git commit -m "Aggiornamento automatico previsioni ECMWF"
            git push
          fi
